#!/bin/bash
# Buildkite dynamic pipeline - standard SSH variant
set -e
PYTHON314_BUILDER_IMAGE="${PYTHON314_BUILDER_IMAGE:-swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/compile-ubuntu2004:v20260717_py3146_obs}"
PYTHON314_BOOTSTRAP_AMD64_IMAGE="swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/compile-ubuntu2004:v20260428_cmake33110"
PYTHON314_BOOTSTRAP_ARM64_IMAGE="swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/compile-ubuntu2004:v20260428_cmake33110"
BUILDER_IMAGE="${BUILDER_IMAGE_OVERRIDE:-${PYTHON314_BUILDER_IMAGE}}"
SANDBOX_PACKAGER_IMAGE="${SANDBOX_PACKAGER_IMAGE:-swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/sandbox-packager:v20260506_kubectl}"
SANDBOX_DEPLOYER_IMAGE="${SANDBOX_DEPLOYER_IMAGE:-swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/sandbox-deployer:v20260506_kubectl_py39}"
ENABLE_MACOS_SDK="${ENABLE_MACOS_SDK_OVERRIDE:-${ENABLE_MACOS_SDK:-true}}"
ENABLE_LINUX_ARM="${ENABLE_LINUX_ARM:-true}"
ENABLE_RUNTIME_X86="${ENABLE_RUNTIME_X86:-true}"
ENABLE_RUNTIME_ARM="${ENABLE_RUNTIME_ARM:-true}"
ENABLE_SANDBOX_PACKAGE="${ENABLE_SANDBOX_PACKAGE:-true}"
ENABLE_SANDBOX_K8S_TEST="${ENABLE_SANDBOX_K8S_TEST:-${ENABLE_SANDBOX_BEIJING4_DEPLOY:-false}}"
ENABLE_SANDBOX_K8S_TEST_ONLY="${ENABLE_SANDBOX_K8S_TEST_ONLY:-false}"
ENABLE_PYTHON314_BUILDER_BOOTSTRAP="${ENABLE_PYTHON314_BUILDER_BOOTSTRAP:-false}"
ENABLE_RUST_FUNCTIONSYSTEM_ST="${ENABLE_RUST_FUNCTIONSYSTEM_ST:-false}"
RUST_BUILDER_IMAGE="${RUST_BUILDER_IMAGE:-swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/compile-ubuntu2004-rust:v20260507_x86_64}"
FUNCTIONSYSTEM_REPO="${FUNCTIONSYSTEM_REPO:-https://gitcode.com/openeuler/yuanrong-functionsystem.git}"
FUNCTIONSYSTEM_BRANCH="${FUNCTIONSYSTEM_BRANCH:-master}"
BUILD_ALL_IMAGE="${BUILDER_IMAGE}"
SDK_BUILDER_IMAGE="${BUILDER_IMAGE}"
RRT_BUILDER_IMAGE="${RUST_BUILDER_IMAGE}"
# rrt-runtime (Rust) is built in its own parallel "Build RRT <arch>" step using
# RRT_BUILDER_IMAGE. The C++ FunctionSystem build and SDK wheel jobs stay on the
# Python 3.14 standard builder; RRT does not require a Python 3.14 Rust overlay.
ENABLE_RUST_BUILD="${ENABLE_RUST_BUILD:-true}"
# arm64 rrt-runtime requires a Rust-capable arm64 builder image. Keep it off by
# default until that image is available; amd64 sandbox packaging/tests still run.
ENABLE_RRT_ARM="${ENABLE_RRT_ARM:-false}"
ENABLE_SANDBOX_MANIFEST="${ENABLE_SANDBOX_MANIFEST:-${ENABLE_LINUX_ARM}}"
SDK_PYTHON_VERSIONS="${SDK_PYTHON_VERSIONS:-python3.9 python3.10 python3.11 python3.12 python3.13 python3.14}"
SANDBOX_RUNTIME_IMAGE_PYTHON_VERSIONS="${SANDBOX_RUNTIME_IMAGE_PYTHON_VERSIONS:-${SDK_PYTHON_VERSIONS}}"

is_enabled() {
  case "$1" in
    1|true|TRUE|yes|YES|on|ON) return 0 ;;
    *) return 1 ;;
  esac
}

# Generate the publish step when either PUBLISH_PYPI or PUBLISH_TEST_PYPI is explicitly
# enabled, or when neither is set (default: true).  Do NOT suppress the step just because
# PUBLISH_TEST_PYPI=0 – that only means "don't upload to TestPyPI", not "skip all uploads".
if [ -z "${ENABLE_TEST_PYPI_PUBLISH:-}" ]; then
  if is_enabled "${PUBLISH_PYPI:-}"; then
    ENABLE_TEST_PYPI_PUBLISH=true
  else
    ENABLE_TEST_PYPI_PUBLISH="${PUBLISH_TEST_PYPI:-true}"
  fi
fi

validate_ci_value() {
  local name="$1"
  local value="$2"
  local pattern="$3"

  if [[ ! "$value" =~ $pattern ]]; then
    echo "Invalid $name for dynamic pipeline: $value" >&2
    exit 1
  fi
}

if is_enabled "${ENABLE_RUST_FUNCTIONSYSTEM_ST}"; then
  validate_ci_value "FUNCTIONSYSTEM_REPO" "$FUNCTIONSYSTEM_REPO" '^[A-Za-z0-9._:/@+~-]+$'
  validate_ci_value "FUNCTIONSYSTEM_BRANCH" "$FUNCTIONSYSTEM_BRANCH" '^[A-Za-z0-9._/-]+$'
  validate_ci_value "RUST_BUILDER_IMAGE" "$RUST_BUILDER_IMAGE" '^[A-Za-z0-9._:/@-]+$'
  BUILD_ALL_IMAGE="${RUST_BUILDER_IMAGE}"
fi

if is_enabled "${ENABLE_RUST_BUILD}"; then
  validate_ci_value "RUST_BUILDER_IMAGE" "$RUST_BUILDER_IMAGE" '^[A-Za-z0-9._:/@-]+$'
fi

sdk_python_suffix() {
  case "$1" in
    python3.9) printf 'cp39' ;;
    python3.10) printf 'cp310' ;;
    python3.11) printf 'cp311' ;;
    python3.12) printf 'cp312' ;;
    python3.13) printf 'cp313' ;;
    python3.14) printf 'cp314' ;;
    *)
      printf 'Unsupported SDK Python version: %s\n' "$1" >&2
      exit 1
      ;;
  esac
}

select_sdk_python_version() {
  local preferred="$1"
  local first=""
  local candidate
  for candidate in ${SDK_PYTHON_VERSIONS}; do
    [ -n "${first}" ] || first="${candidate}"
    if [ "${candidate}" = "${preferred}" ]; then
      printf '%s' "${candidate}"
      return 0
    fi
  done
  [ -n "${first}" ] || {
    printf 'SDK_PYTHON_VERSIONS must contain at least one supported version.\n' >&2
    exit 1
  }
  printf '%s' "${first}"
}

SANDBOX_AMD64_SDK_PYTHON_VERSION="$(select_sdk_python_version python3.11)"
SANDBOX_AMD64_SDK_SUFFIX="$(sdk_python_suffix "${SANDBOX_AMD64_SDK_PYTHON_VERSION}")"
SANDBOX_AMD64_SDK_STEP="build-sdk-amd64-${SANDBOX_AMD64_SDK_SUFFIX}"
SANDBOX_ARM64_SDK_PYTHON_VERSION="$(select_sdk_python_version python3.9)"
SANDBOX_ARM64_SDK_SUFFIX="$(sdk_python_suffix "${SANDBOX_ARM64_SDK_PYTHON_VERSION}")"
SANDBOX_ARM64_SDK_STEP="build-sdk-arm64-${SANDBOX_ARM64_SDK_SUFFIX}"
SANDBOX_MANIFEST_SDK_DEPENDS=""
SANDBOX_MANIFEST_RUNTIME_DEPENDS=""
SANDBOX_MANIFEST_SANDBOX_SDK_DEPENDS=""
SANDBOX_MANIFEST_EXTRA_DEPENDS=""
SANDBOX_RUNTIME_IMAGE_STEPS=""
SANDBOX_RRT_ARTIFACT_STEPS="build-rrt-amd64"
SANDBOX_MANIFEST_ARCHES="amd64"
SANDBOX_MANIFEST_RELEASE_DEPENDS=$'\n'"      - \"publish-sandbox-release-amd64\""
SANDBOX_ARM_RRT_DEPENDS=""
SANDBOX_ARM_RRT_OPTIONAL="1"
if is_enabled "${ENABLE_LINUX_ARM}"; then
  SANDBOX_MANIFEST_ARCHES="amd64 arm64"
  SANDBOX_MANIFEST_RELEASE_DEPENDS=$'\n'"      - \"publish-sandbox-release-amd64\""$'\n'"      - \"publish-sandbox-release-arm64\""
fi
if is_enabled "${ENABLE_LINUX_ARM}" && is_enabled "${ENABLE_RRT_ARM}"; then
  SANDBOX_RRT_ARTIFACT_STEPS="build-rrt-amd64 build-rrt-arm64"
  SANDBOX_ARM_RRT_DEPENDS=$'\n'"      - \"build-rrt-arm64\""
  SANDBOX_ARM_RRT_OPTIONAL="0"
fi
SANDBOX_TEST_PYPI_SANDBOX_SDK_DEPENDS=""
SANDBOX_TEST_PYPI_DEPENDS=""
SANDBOX_SANDBOX_SDK_STEPS=""
SANDBOX_SDK_STEPS=""
for SDK_PYTHON_VERSION in ${SDK_PYTHON_VERSIONS}; do
  SDK_SUFFIX="$(sdk_python_suffix "${SDK_PYTHON_VERSION}")"
  SANDBOX_SDK_STEPS="${SANDBOX_SDK_STEPS:+${SANDBOX_SDK_STEPS} }build-sdk-amd64-${SDK_SUFFIX}"
  SANDBOX_TEST_PYPI_DEPENDS="${SANDBOX_TEST_PYPI_DEPENDS}"$'\n'"      - \"build-sdk-amd64-${SDK_SUFFIX}\""
  SANDBOX_MANIFEST_SDK_DEPENDS="${SANDBOX_MANIFEST_SDK_DEPENDS}"$'\n'"      - \"build-sdk-amd64-${SDK_SUFFIX}\""
  if is_enabled "${ENABLE_LINUX_ARM}"; then
    SANDBOX_SDK_STEPS="${SANDBOX_SDK_STEPS} build-sdk-arm64-${SDK_SUFFIX}"
    SANDBOX_TEST_PYPI_DEPENDS="${SANDBOX_TEST_PYPI_DEPENDS}"$'\n'"      - \"build-sdk-arm64-${SDK_SUFFIX}\""
    SANDBOX_MANIFEST_SDK_DEPENDS="${SANDBOX_MANIFEST_SDK_DEPENDS}"$'\n'"      - \"build-sdk-arm64-${SDK_SUFFIX}\""
  fi
  if is_enabled "${ENABLE_MACOS_SDK}"; then
    SANDBOX_SDK_STEPS="${SANDBOX_SDK_STEPS} build-sdk-macos-arm64-${SDK_SUFFIX}"
    SANDBOX_TEST_PYPI_DEPENDS="${SANDBOX_TEST_PYPI_DEPENDS}"$'\n'"      - \"build-sdk-macos-arm64-${SDK_SUFFIX}\""
    SANDBOX_MANIFEST_SDK_DEPENDS="${SANDBOX_MANIFEST_SDK_DEPENDS}"$'\n'"      - \"build-sdk-macos-arm64-${SDK_SUFFIX}\""
  fi
done
for SDK_PYTHON_VERSION in ${SANDBOX_RUNTIME_IMAGE_PYTHON_VERSIONS}; do
  SDK_SUFFIX="$(sdk_python_suffix "${SDK_PYTHON_VERSION}")"
  SANDBOX_RUNTIME_IMAGE_STEPS="${SANDBOX_RUNTIME_IMAGE_STEPS:+${SANDBOX_RUNTIME_IMAGE_STEPS} }publish-runtime-amd64-${SDK_SUFFIX}"
  SANDBOX_MANIFEST_RUNTIME_DEPENDS="${SANDBOX_MANIFEST_RUNTIME_DEPENDS}"$'\n'"      - \"publish-runtime-amd64-${SDK_SUFFIX}\""
  if is_enabled "${ENABLE_LINUX_ARM}"; then
    SANDBOX_RUNTIME_IMAGE_STEPS="${SANDBOX_RUNTIME_IMAGE_STEPS} publish-runtime-arm64-${SDK_SUFFIX}"
    SANDBOX_MANIFEST_RUNTIME_DEPENDS="${SANDBOX_MANIFEST_RUNTIME_DEPENDS}"$'\n'"      - \"publish-runtime-arm64-${SDK_SUFFIX}\""
  fi
done
if is_enabled "${ENABLE_SANDBOX_PACKAGE}"; then
  SANDBOX_SANDBOX_SDK_STEPS="test-sandbox-sdk"
  SANDBOX_MANIFEST_SANDBOX_SDK_DEPENDS=$'\n'"      - \"test-sandbox-sdk\""
  SANDBOX_TEST_PYPI_SANDBOX_SDK_DEPENDS=$'\n'"      - \"test-sandbox-sdk\""
fi

SANDBOX_FINAL_PACKAGE_STEP="publish-sandbox-release-amd64"
if is_enabled "${ENABLE_SANDBOX_PACKAGE}" && is_enabled "${ENABLE_LINUX_ARM}" && is_enabled "${ENABLE_SANDBOX_MANIFEST}"; then
  SANDBOX_FINAL_PACKAGE_STEP="publish-sandbox-manifest"
fi

emit_sandbox_k8s_test() {
local depends_on=""
if ! is_enabled "${ENABLE_SANDBOX_K8S_TEST_ONLY}"; then
depends_on="    depends_on:
      - \"${SANDBOX_FINAL_PACKAGE_STEP}\"
${SANDBOX_MANIFEST_RUNTIME_DEPENDS}"
fi
cat << YAML
  - label: ":rocket: Test K8S"
    key: "test-k8s"
    # Serialize K8S deploys across all branches/builds. The chart pins
    # fullnameOverride=yr + a shared namespace, and the node DaemonSet is
    # host-level (fixed hostPorts/hostPaths), so two concurrent Test K8S runs
    # overwrite each other's frontend Deployment and clash on the host ->
    # "deployment yr-frontend exceeded its progress deadline". One at a time.
    concurrency_group: "yuanrong/sandbox-test-k8s"
    concurrency: 1
${depends_on}
    command: |
      set -e
      export PATH="/workspace:\$\$PATH"
      bash .buildkite/test_sandbox_k8s.sh
    env:
      BUILDKITE_AGENT_NAME: "agent-stack-k8s"
      SANDBOX_PACKAGE_STEP_KEY: "${SANDBOX_FINAL_PACKAGE_STEP}"
      SANDBOX_SDK_STEP_KEY: "${SANDBOX_AMD64_SDK_STEP}"
      YR_K8S_RUNTIME_IMAGE_ARCH: "amd64"
    agents:
      queue: "default"
      os: "linux"
      arch: "amd64"
    plugins:
      - kubernetes:
          podSpec:
            imagePullSecrets:
              - name: swr-pull-secret
            containers:
              - image: "$SANDBOX_DEPLOYER_IMAGE"
                resources:
                  requests: { cpu: "2", memory: "4Gi" }
                  limits: { cpu: "4", memory: "8Gi" }
                env:
                  - name: SWR_USERNAME
                    valueFrom:
                      secretKeyRef:
                        name: swr-credentials
                        key: username
                        optional: true
                  - name: SWR_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: swr-credentials
                        key: password
                        optional: true
                  - name: SWR_DOCKER_CONFIG_JSON
                    valueFrom:
                      secretKeyRef:
                        name: swr-pull-secret
                        key: .dockerconfigjson
                        optional: true
    timeout_in_minutes: 60
YAML
}

# sandbox-sdk (sandbox-sdk submodule): build the pure-Python wheel and run the
# sandbox-sdk -> rrt direct-routing verification. The test (offline, MockTransport)
# asserts the SDK takes the frontend /direct/{id}/invoke alias to the rrt port,
# falls back to frontend invoke on route failure,
# and sticky-disables — i.e. the
# build's test suite includes sandbox-sdk -> rrt direct verification. Building + installing the
# wheel also validates sandbox-sdk packaging end to end.
emit_sandbox_sdk_test() {
cat << YAML
  - label: ":snake: Build SDK Sandbox"
    key: "test-sandbox-sdk"
    command: |
      set -e
      export PIP_BREAK_SYSTEM_PACKAGES=1
      export PATH=/opt/buildtools/python3.11/bin:/usr/local/bin:/usr/bin:\$\$PATH
      PY=\$\$(command -v python3.11 || command -v python3)
      git submodule sync --recursive
      git submodule update --init --recursive --force --jobs=4 sandbox-sdk
      # sandbox-sdk pip wheel build isolation must use the internal mirror; otherwise it fetches
      # build dependencies (setuptools/setuptools-scm) from public PyPI and often times out. pip subprocesses inherit these env vars.
      export PIP_INDEX_URL="\$\${PIP_INDEX_URL:-https://mirrors.huaweicloud.com/repository/pypi/simple}"
      export PIP_TRUSTED_HOST="\$\${PIP_TRUSTED_HOST:-mirrors.huaweicloud.com}"
      export PIP_DEFAULT_TIMEOUT="\$\${PIP_DEFAULT_TIMEOUT:-180}"
      bash sandbox-sdk/build.sh "\$\$(pwd)/output"
      ls -lh output/openyuanrong_sandbox-*.whl
      \$\$PY -m pip install --index-url "\$\${PIP_INDEX_URL:-https://mirrors.huaweicloud.com/repository/pypi/simple}" --trusted-host "\$\${PIP_TRUSTED_HOST:-mirrors.huaweicloud.com}" output/openyuanrong_sandbox-*.whl
      echo "== sandbox-sdk -> rrt direct contract test =="
      \$\$PY sandbox-sdk/python/tests/test_transport_direct.py
      mkdir -p artifacts/sandbox-sdk
      cp output/openyuanrong_sandbox-*.whl artifacts/sandbox-sdk/
      ls -lh artifacts/sandbox-sdk/
      bash .buildkite/upload_buildkite_packages.sh artifacts/sandbox-sdk/*.whl || true
      echo "== upload sandbox-sdk wheel to OBS =="
      OBS_UPLOAD_CHANNEL="daily"
      OBS_UPLOAD_VERSION_ARGS=""
      if [ -n "\$\$TAG_BUILD_VERSION" ]; then
        OBS_UPLOAD_CHANNEL="release"
        OBS_UPLOAD_VERSION_ARGS="--version \$\$YR_BUILD_VERSION"
      fi
      bash .buildkite/upload_obs_artifacts.sh \
        --output artifacts/sandbox-sdk/obs-urls.txt \
        --platform linux \
        --arch noarch \
        --channel "\$\$OBS_UPLOAD_CHANNEL" \
        \$\$OBS_UPLOAD_VERSION_ARGS \
        -- artifacts/sandbox-sdk/openyuanrong_sandbox-*.whl
      cat artifacts/sandbox-sdk/obs-urls.txt 2>/dev/null || true
    agents:
      queue: "default"
      os: "linux"
      arch: "amd64"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: "$BUILDER_IMAGE"
                resources:
                  requests: { cpu: "1", memory: "1Gi" }
                  limits: { cpu: "2", memory: "2Gi" }
                env:
                  - name: BUILDKITE_PACKAGE_UPLOAD_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: buildkite-package-credentials
                        key: api-token
                        optional: true
                  - name: OBS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: AK
                        optional: true
                  - name: OBS_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: SK
                        optional: true
    timeout_in_minutes: 20
YAML
}

emit_test_pypi_publish() {
cat << YAML
  - label: ":snake: Publish Wheels PyPI"
    key: "publish-wheels-testpypi"
    depends_on:
${SANDBOX_TEST_PYPI_DEPENDS}
${SANDBOX_TEST_PYPI_SANDBOX_SDK_DEPENDS}
    command: |
      set -e
      rm -rf artifacts/test-pypi-wheels artifacts/test-pypi-urls
      mkdir -p artifacts/test-pypi-wheels artifacts/test-pypi-urls
      for step_key in ${SANDBOX_SDK_STEPS} ${SANDBOX_SANDBOX_SDK_STEPS}; do
        mkdir -p "artifacts/test-pypi-urls/\$\$step_key"
        buildkite-agent meta-data get "obs-urls.\$\$step_key" > "artifacts/test-pypi-urls/\$\$step_key/obs-urls.txt" || true
      done
      python3 .buildkite/download_obs_artifacts.py \
        --urls-root artifacts/test-pypi-urls \
        --output-dir artifacts/test-pypi-wheels \
        --pattern 'openyuanrong_sdk*.whl' \
        --pattern 'openyuanrong_sandbox*.whl' \
        --all
      find artifacts/test-pypi-wheels -type f \
        \( -name 'openyuanrong_sdk*.whl' -o -name 'openyuanrong_sandbox*.whl' \) \
        -print | sort
      bash .buildkite/upload_test_pypi_wheels.sh artifacts/test-pypi-wheels
    env:
      BUILDKITE_AGENT_NAME: "agent-stack-k8s"
      SANDBOX_SDK_STEPS: "${SANDBOX_SDK_STEPS}"
      SANDBOX_SANDBOX_SDK_STEPS: "${SANDBOX_SANDBOX_SDK_STEPS}"
    agents:
      queue: "default"
      os: "linux"
      arch: "amd64"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: "$BUILDER_IMAGE"
                resources:
                  requests: { cpu: "1", memory: "1Gi" }
                  limits: { cpu: "2", memory: "2Gi" }
                env:
                  - name: TEST_PYPI_API_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: test-pypi-credentials
                        key: api-token
                        optional: true
                  - name: PYPI_API_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: pypi-credentials
                        key: api-token
                        optional: true
    timeout_in_minutes: 30
YAML
}

emit_sandbox_runtime_image() {
  local image_arch="$1"
  local agent_arch="$2"
  local sdk_suffix="$3"
  local sdk_step="$4"
  local pod_image="$5"
  local buildkit_mode="$6"
  local key="publish-runtime-${image_arch}-${sdk_suffix}"
  local node_selector=""
  local agent_arch_attr="arch"

  local rrt_depends=$'\n'"      - \"build-rrt-${image_arch}\""
  local rrt_optional="0"

  if [ "${agent_arch}" = "arm64" ]; then
    agent_arch_attr="linux_arch"
    node_selector="            nodeSelector:
              kubernetes.io/arch: arm64"
  fi
  if [ "${image_arch}" = "arm64" ] && ! is_enabled "${ENABLE_RRT_ARM}"; then
    rrt_depends=""
    rrt_optional="1"
  fi

cat << YAML
  - label: ":package: Build Runtime ${image_arch} ${sdk_suffix}"
    key: "${key}"
    depends_on:
      - "build-all-amd64"${rrt_depends}
      - "${sdk_step}"
    command: |
      set -e
      export PATH="/workspace:\$\$PATH"
      COMMIT_FOR_VERSION="\$\${BUILDKITE_COMMIT:-\$\$(git rev-parse HEAD)}"
      SHORT_COMMIT=\$\$(printf '%s' "\$\$COMMIT_FOR_VERSION" | cut -c1-12)
      TAG_BUILD_VERSION="\$\${YR_RELEASE_TAG:-\$\${BUILDKITE_TAG:-}}"
      TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#refs/tags/}"
      case "\$\$TAG_BUILD_VERSION" in v[0-9]*) TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#v}" ;; esac
      YR_BUILD_VERSION="\$\${YR_BUILD_VERSION:-\$\${BUILD_VERSION:-\$\${TAG_BUILD_VERSION:-0.7.0+\$\$SHORT_COMMIT}}}"
      export BUILD_VERSION="\$\$YR_BUILD_VERSION"
      export YR_EXPECTED_SDK_VERSION="\$\$YR_BUILD_VERSION"
      bash .buildkite/package_sandbox_release.sh
    env:
      BUILDKITE_AGENT_NAME: "agent-stack-k8s"
      SANDBOX_SDK_STEP_KEY: "${sdk_step}"
      YR_K8S_RUNTIME_ONLY: "1"
      YR_K8S_IMAGE_ARCH: "${image_arch}"
      YR_K8S_IMAGE_PLATFORM: "linux/${image_arch}"
      YR_K8S_IMAGE_TAG_SUFFIX: "-${image_arch}-${sdk_suffix}"
      YR_K8S_IMAGE_SDK_WHEEL_PATTERN: "openyuanrong_sdk*-${sdk_suffix}-*.whl"
      YR_K8S_IMAGE_CACHE: "1"
      YR_K8S_IMAGE_CACHE_TAG: "build-cache-runtime-${image_arch}-${sdk_suffix}"
      YR_K8S_DOCKER_BUILDKIT: "${buildkit_mode}"
      YR_K8S_RRT_OPTIONAL: "${rrt_optional}"
    agents:
      queue: "default"
      os: "linux"
      ${agent_arch_attr}: "${agent_arch}"
    plugins:
      - kubernetes:
          podSpec:
${node_selector}
            imagePullSecrets:
              - name: swr-pull-secret
            containers:
              - image: "${pod_image}"
                securityContext:
                  privileged: true
                volumeMounts:
                  - name: docker-graph
                    mountPath: /var/lib/docker
                resources:
                  requests: { cpu: "4", memory: "8Gi" }
                  limits: { cpu: "8", memory: "16Gi" }
                env:
                  - name: SWR_USERNAME
                    valueFrom:
                      secretKeyRef:
                        name: swr-credentials
                        key: username
                        optional: true
                  - name: SWR_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: swr-credentials
                        key: password
                        optional: true
                  - name: SWR_DOCKER_CONFIG_JSON
                    valueFrom:
                      secretKeyRef:
                        name: swr-pull-secret
                        key: .dockerconfigjson
                        optional: true
            volumes:
              - name: docker-graph
                emptyDir: {}
    timeout_in_minutes: 90
YAML
}

emit_python314_builder_bootstrap() {
cat << YAML
  - group: ":construction: Python 3.14 builder bootstrap"
    key: "python314-builder-bootstrap"
    steps:
      - label: ":docker: Build Python 3.14 builder amd64"
        key: "build-python314-builder-amd64"
        command: |
          set -e
          bash .buildkite/build_python314_builder_image.sh
        env:
          PYTHON314_BUILDER_VARIANT: "compile"
          PYTHON314_BUILDER_ARCH: "amd64"
          PYTHON314_BUILDER_BASE_IMAGE: "${PYTHON314_BOOTSTRAP_AMD64_IMAGE}"
          PYTHON314_BUILDER_OUTPUT_TAG: "${PYTHON314_BUILDER_IMAGE}-amd64"
        agents:
          queue: "default"
          os: "linux"
          arch: "amd64"
        plugins:
          - kubernetes:
              podSpec:
                imagePullSecrets:
                  - name: swr-pull-secret
                containers:
                  - image: "${SANDBOX_PACKAGER_IMAGE}"
                    securityContext:
                      privileged: true
                    volumeMounts:
                      - name: docker-graph
                        mountPath: /var/lib/docker
                    resources:
                      requests: { cpu: "8", memory: "16Gi" }
                      limits: { cpu: "16", memory: "32Gi" }
                    env:
                      - name: SWR_USERNAME
                        valueFrom:
                          secretKeyRef: { name: swr-credentials, key: username, optional: true }
                      - name: SWR_PASSWORD
                        valueFrom:
                          secretKeyRef: { name: swr-credentials, key: password, optional: true }
                      - name: SWR_DOCKER_CONFIG_JSON
                        valueFrom:
                          secretKeyRef: { name: swr-pull-secret, key: .dockerconfigjson, optional: true }
                volumes:
                  - name: docker-graph
                    emptyDir: {}
        timeout_in_minutes: 120

      - label: ":docker: Build Python 3.14 builder arm64"
        key: "build-python314-builder-arm64"
        command: |
          set -e
          bash .buildkite/build_python314_builder_image.sh
        env:
          PYTHON314_BUILDER_VARIANT: "compile"
          PYTHON314_BUILDER_ARCH: "arm64"
          PYTHON314_BUILDER_BASE_IMAGE: "${PYTHON314_BOOTSTRAP_ARM64_IMAGE}"
          PYTHON314_BUILDER_OUTPUT_TAG: "${PYTHON314_BUILDER_IMAGE}-arm64"
        agents:
          queue: "default"
          os: "linux"
          linux_arch: "arm64"
        plugins:
          - kubernetes:
              podSpec:
                nodeSelector:
                  kubernetes.io/arch: arm64
                imagePullSecrets:
                  - name: swr-pull-secret
                containers:
                  - image: "${PYTHON314_BOOTSTRAP_ARM64_IMAGE}"
                    securityContext:
                      privileged: true
                    volumeMounts:
                      - name: docker-graph
                        mountPath: /var/lib/docker
                    resources:
                      requests: { cpu: "8", memory: "16Gi" }
                      limits: { cpu: "16", memory: "32Gi" }
                    env:
                      - name: SWR_USERNAME
                        valueFrom:
                          secretKeyRef: { name: swr-credentials, key: username, optional: true }
                      - name: SWR_PASSWORD
                        valueFrom:
                          secretKeyRef: { name: swr-credentials, key: password, optional: true }
                      - name: SWR_DOCKER_CONFIG_JSON
                        valueFrom:
                          secretKeyRef: { name: swr-pull-secret, key: .dockerconfigjson, optional: true }
                volumes:
                  - name: docker-graph
                    emptyDir: {}
        timeout_in_minutes: 120

      - label: ":docker: Publish Python 3.14 builder manifest"
        key: "publish-python314-builder-manifest"
        depends_on:
          - "build-python314-builder-amd64"
          - "build-python314-builder-arm64"
        command: |
          set -euo pipefail
          : "\$\${PYTHON314_BUILDER_FINAL_TAG:?missing final tag}"
          : "\$\${PYTHON314_BUILDER_AMD64_TAG:?missing amd64 tag}"
          : "\$\${PYTHON314_BUILDER_ARM64_TAG:?missing arm64 tag}"
          mkdir -p artifacts/python314-builder
          source .buildkite/docker_job_helpers.sh
          trap docker_job_stop_dockerd EXIT
          docker_job_start_dockerd artifacts/python314-builder/dockerd.log
          if [ -n "\$\${SWR_USERNAME:-}" ] && [ -n "\$\${SWR_PASSWORD:-}" ]; then
            printf '%s' "\$\$SWR_PASSWORD" | docker login "\$\${PYTHON314_BUILDER_FINAL_TAG%%/*}" -u "\$\$SWR_USERNAME" --password-stdin
          elif [ -n "\$\${SWR_DOCKER_CONFIG_JSON:-}" ]; then
            mkdir -p "\$\$HOME/.docker"
            printf '%s' "\$\$SWR_DOCKER_CONFIG_JSON" >"\$\$HOME/.docker/config.json"
          else
            echo "SWR credentials are required to publish the builder manifest." >&2
            exit 1
          fi
          for source in "\$\$PYTHON314_BUILDER_AMD64_TAG" "\$\$PYTHON314_BUILDER_ARM64_TAG"; do
            digest=\$\$(docker manifest inspect --verbose "\$\$source" | python3 -c 'import json,sys; data=json.load(sys.stdin); values=[]; walk=lambda x: values.append(x.get("digest")) if isinstance(x,dict) and x.get("digest") else [walk(v) for v in (x.values() if isinstance(x,dict) else x if isinstance(x,list) else [])]; walk(data); print(next((v for v in values if v.startswith("sha256:")), ""))')
            [ -n "\$\$digest" ] || { echo "Missing registry digest for \$\$source" >&2; exit 1; }
            echo "Verified \$\$source at \$\$digest"
          done
          docker manifest rm "\$\$PYTHON314_BUILDER_FINAL_TAG" >/dev/null 2>&1 || true
          docker manifest create "\$\$PYTHON314_BUILDER_FINAL_TAG" "\$\$PYTHON314_BUILDER_AMD64_TAG" "\$\$PYTHON314_BUILDER_ARM64_TAG"
          docker manifest annotate "\$\$PYTHON314_BUILDER_FINAL_TAG" "\$\$PYTHON314_BUILDER_AMD64_TAG" --os linux --arch amd64
          docker manifest annotate "\$\$PYTHON314_BUILDER_FINAL_TAG" "\$\$PYTHON314_BUILDER_ARM64_TAG" --os linux --arch arm64
          docker manifest push --purge "\$\$PYTHON314_BUILDER_FINAL_TAG"
          docker manifest inspect "\$\$PYTHON314_BUILDER_FINAL_TAG" | python3 -c 'import json,sys; data=json.load(sys.stdin); platforms={(item["platform"]["os"],item["platform"]["architecture"]) for item in data["manifests"]}; assert platforms == {("linux","amd64"),("linux","arm64")}, platforms'
        env:
          PYTHON314_BUILDER_FINAL_TAG: "${PYTHON314_BUILDER_IMAGE}"
          PYTHON314_BUILDER_AMD64_TAG: "${PYTHON314_BUILDER_IMAGE}-amd64"
          PYTHON314_BUILDER_ARM64_TAG: "${PYTHON314_BUILDER_IMAGE}-arm64"
        agents:
          queue: "default"
          os: "linux"
          arch: "amd64"
        plugins:
          - kubernetes:
              podSpec:
                imagePullSecrets:
                  - name: swr-pull-secret
                containers:
                  - image: "${SANDBOX_PACKAGER_IMAGE}"
                    securityContext:
                      privileged: true
                    volumeMounts:
                      - name: docker-graph
                        mountPath: /var/lib/docker
                    resources:
                      requests: { cpu: "2", memory: "4Gi" }
                      limits: { cpu: "4", memory: "8Gi" }
                    env:
                      - name: SWR_USERNAME
                        valueFrom:
                          secretKeyRef: { name: swr-credentials, key: username, optional: true }
                      - name: SWR_PASSWORD
                        valueFrom:
                          secretKeyRef: { name: swr-credentials, key: password, optional: true }
                      - name: SWR_DOCKER_CONFIG_JSON
                        valueFrom:
                          secretKeyRef: { name: swr-pull-secret, key: .dockerconfigjson, optional: true }
                volumes:
                  - name: docker-graph
                    emptyDir: {}
        timeout_in_minutes: 30
YAML
}

echo "steps:"
if is_enabled "${ENABLE_PYTHON314_BUILDER_BOOTSTRAP}"; then
  emit_python314_builder_bootstrap
  exit 0
fi
if is_enabled "${ENABLE_SANDBOX_K8S_TEST_ONLY}"; then
  emit_sandbox_k8s_test
  exit 0
fi

if is_enabled "${ENABLE_RUNTIME_X86}"; then
cat << YAML
  - label: ":rocket: Build X86"
    key: "build-all-amd64"
    command: |
      set -e
      echo "=== [1/3] Environment Setup ==="
      
      export PATH=/opt/buildtools/python3.11/bin:/usr/local/bin:/usr/bin:\$\$PATH
      export CC=gcc-10
      export CXX=g++-10
      export PIP_BREAK_SYSTEM_PACKAGES=1
      # rrt-runtime (Rust) is built once per arch in the dedicated parallel
      # "Build RRT amd64" step (key build-rrt-amd64), NOT here -- skip it so this
      # build's critical path no longer serializes the ~48min cold cargo build.
      export BUILD_SKIP_RUST=1
      export SDK_PYTHON_VERSIONS="${SDK_PYTHON_VERSIONS}"
      JOBS="\$\${JOBS:-16}"
      FUNCTIONSYSTEM_JOBS="\$\${FUNCTIONSYSTEM_JOBS:-8}"
      export FUNCTIONSYSTEM_JOBS
      COMMIT_FOR_VERSION="\$\${BUILDKITE_COMMIT:-\$\$(git rev-parse HEAD)}"
      SHORT_COMMIT=\$\$(printf '%s' "\$\$COMMIT_FOR_VERSION" | cut -c1-12)
      TAG_BUILD_VERSION="\$\${YR_RELEASE_TAG:-\$\${BUILDKITE_TAG:-}}"
      TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#refs/tags/}"
      case "\$\$TAG_BUILD_VERSION" in v[0-9]*) TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#v}" ;; esac
      YR_BUILD_VERSION="\$\${YR_BUILD_VERSION:-\$\${BUILD_VERSION:-\$\${TAG_BUILD_VERSION:-0.7.0+\$\$SHORT_COMMIT}}}"
      BAZEL_BUILD_VERSION="\$\${BAZEL_BUILD_VERSION:-\$\${TAG_BUILD_VERSION:-\$\$(cat VERSION)}}"
      export BAZEL_BUILD_VERSION
      export COMMIT_ID="\$\$COMMIT_FOR_VERSION"
      echo "Package version: \$\$YR_BUILD_VERSION"
      echo "Bazel build version: \$\$BAZEL_BUILD_VERSION"
      
      CACHE_BASE="/mnt/paas/build-cache"
      mkdir -p \$\$CACHE_BASE/ccache \$\$CACHE_BASE/go-mod \$\$CACHE_BASE/go-cache \
        \$\$CACHE_BASE/opensource \$\$CACHE_BASE/pip \$\$CACHE_BASE/functionsystem-vendor-cache
      export CCACHE_DIR=\$\$CACHE_BASE/ccache
      export CCACHE_MAXSIZE="\$\${CCACHE_MAXSIZE:-100G}"
      ccache -M "\$\$CCACHE_MAXSIZE"
      export GOMODCACHE=\$\$CACHE_BASE/go-mod
      export PIP_CACHE_DIR=\$\$CACHE_BASE/pip
      # Keep Go's content-addressed build cache warm across Buildkite jobs; cache-aging handles old entries.
      export GOCACHE=\$\$CACHE_BASE/go-cache/\$\${BUILD_ARCH:-amd64}
      # cargo cache on the persistent volume so the //api/rust genrule does an
      # INCREMENTAL cargo build (deps cached) instead of a ~48min from-scratch
      # release build every checkout. genrule honors CARGO_TARGET_DIR.
      export CARGO_HOME=\$\$CACHE_BASE/cargo-home
      export CARGO_TARGET_DIR=\$\$CACHE_BASE/cargo-target/\$\${BUILD_ARCH:-amd64}
      mkdir -p \$\$CARGO_HOME \$\$CARGO_TARGET_DIR
      # sccache: content-addressed rustc cache on the hostPath volume. Survives
      # bazel's per-build exec-root path churn (which busts cargo target-dir
      # fingerprints), so the //api/rust build reuses crates across builds.
      . .buildkite/setup_sccache.sh
      mkdir -p "\$\$GOCACHE"
      export DS_OPENSOURCE_DIR=\$\$CACHE_BASE/opensource
      export FS_VENDOR_CACHE_DIR=\$\$CACHE_BASE/functionsystem-vendor-cache
      collect_failure_logs() {
        _STATUS="\$\$1"
        _ARCH="\$\${BUILD_ARCH:-x86_64}"
        _LOG_DIR="artifacts/failure-logs/\$\$_ARCH"
        echo "=== Build failed (exit \$\$_STATUS); collecting diagnostic logs ==="
        mkdir -p "\$\$_LOG_DIR"
        [ -f /tmp/build_output.log ] && cp /tmp/build_output.log "\$\$_LOG_DIR/build_output.log"
        for _DIR in \
            functionsystem/vendor/output/Stamp \
            functionsystem/vendor/src \
            functionsystem/build \
            datasystem/build; do
          if [ -d "\$\$_DIR" ]; then
            find "\$\$_DIR" -type f \( -name "*.log" -o -name "*.rej" \) -print >> "\$\$_LOG_DIR/file-list.txt" || true
          fi
        done
        if [ -s "\$\$_LOG_DIR/file-list.txt" ]; then
          tar -czf "\$\$_LOG_DIR/internal-logs.tar.gz" -T "\$\$_LOG_DIR/file-list.txt" || true
        fi
        ls -lh "\$\$_LOG_DIR" || true
      }
      # bazel-remote: write directly to ~/.bazelrc (Bazel reads unconditionally)
      # Use bash /dev/tcp (built-in, no nc required) to test connectivity
      BAZEL_REMOTE_URL="grpc://bazel-remote.build-tools.svc.cluster.local:9092"
      echo "=== Configuring bazel-remote cache ==="
      case "\$\${YR_BUILDKITE_ENABLE_BAZEL_REMOTE_CACHE:-false}" in
        1|true|TRUE|yes|YES|on|ON) _YR_BAZEL_REMOTE_ENABLED=1 ;;
        *) _YR_BAZEL_REMOTE_ENABLED=0 ;;
      esac
      if [ "\$\$_YR_BAZEL_REMOTE_ENABLED" = "1" ] && timeout 5 bash -c "echo > /dev/tcp/bazel-remote.build-tools.svc.cluster.local/9092" 2>/dev/null; then
        echo "bazel-remote reachable: \$\${BAZEL_REMOTE_URL}"
        export REMOTE_CACHE="\$\${BAZEL_REMOTE_URL}"
      else
        echo "WARNING: bazel-remote disabled or not reachable, building without remote cache"
      fi
      
      echo "=== [2/3] Submodule Update ==="
      git submodule sync --recursive
      git submodule update --init --recursive --force --jobs=4

      case "${ENABLE_RUST_FUNCTIONSYSTEM_ST:-false}" in
        1|true|TRUE|yes|YES|on|ON)
          echo "=== [2.5/6] Replace functionsystem source with Rust branch ==="
          rm -rf functionsystem
          git clone --depth 1 --branch "${FUNCTIONSYSTEM_BRANCH}" "${FUNCTIONSYSTEM_REPO}" functionsystem
          ;;
      esac
      
      echo "=== [3/6] Starting Build (JOBS=\$\$JOBS, FUNCTIONSYSTEM_JOBS=\$\$FUNCTIONSYSTEM_JOBS) ==="
      # Snapshot bazel-remote before build (to compute delta later)
      _BAZEL_PRE=\$\$(wget -qO- http://bazel-remote.build-tools.svc.cluster.local:8080/status 2>/dev/null || echo '{}')
      _BAZEL_FILES_PRE=\$\$(echo "\$\$_BAZEL_PRE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('NumFiles',0))" 2>/dev/null || echo 0)
      _BAZEL_SIZE_PRE=\$\$(echo "\$\$_BAZEL_PRE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d.get('CurrSize',0))//1024//1024)" 2>/dev/null || echo 0)

      BUILD_START=\$\$(date +%s)
      # Capture build output for Bazel action stats while showing live output.
      # Named pipe approach: POSIX-compatible, captures make exit code correctly
      # (avoids PIPESTATUS which is bash-only and fails under /bin/sh).
      # Keep top-level target execution sequential for stability.
      rm -f /tmp/yr_build_pipe
      mkfifo /tmp/yr_build_pipe
      tee /tmp/build_output.log < /tmp/yr_build_pipe &
      set +e
      make all BUILD_VERSION="\$\$YR_BUILD_VERSION" JOBS=\$\$JOBS FUNCTIONSYSTEM_JOBS=\$\$FUNCTIONSYSTEM_JOBS REMOTE_CACHE=\$\${REMOTE_CACHE:-} > /tmp/yr_build_pipe 2>&1
      BUILD_EXIT=\$\$?
      wait
      set -e
      rm -f /tmp/yr_build_pipe
      BUILD_END=\$\$(date +%s)
      BUILD_ELAPSED=\$\$(( BUILD_END - BUILD_START ))
      if [ "\$\$BUILD_EXIT" -ne 0 ]; then
        collect_failure_logs "\$\$BUILD_EXIT"
        exit "\$\$BUILD_EXIT"
      fi
      [ "\$\$BUILD_EXIT" -eq 0 ]

      echo "=== [3.1/6] Collect release artifacts from make all ==="
      find output -maxdepth 1 -name 'openyuanrong-*.tar.gz' -print -quit | grep -q .
      find output -maxdepth 1 -name 'openyuanrong-*.whl' -print -quit | grep -q .

      echo "=== [3.5/6] Verify Go plugin ABI ==="
      python3 .buildkite/verify_go_plugin_abi.py

      (
        set +e
        echo "=== [4/6] Cache Hit Report ==="
        # --- Bazel action stats from build output ---
        # Last "INFO: N processes: ..." line in the log has the final tally
        _BAZEL_PROC=\$\$(grep -E "^INFO: [0-9,]+ processes:" /tmp/build_output.log | tail -1 || echo "")
        if [ -n "\$\$_BAZEL_PROC" ]; then
          _BAZEL_TOTAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ processes" | tr -d ',')
          _BAZEL_TOTAL=\$\${_BAZEL_TOTAL% processes}
          _BAZEL_HIT=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ remote cache hit" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          _BAZEL_LOCAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ processwrapper-sandbox" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          _BAZEL_INTERNAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ internal" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          if [ "\$\${_BAZEL_TOTAL:-0}" -gt 0 ] && [ "\$\${_BAZEL_HIT:-0}" -gt 0 ]; then
            _BAZEL_RATIO=\$\$(awk "BEGIN{printf \"%.1f\", \$\${_BAZEL_HIT}*100/(\$\${_BAZEL_TOTAL}-\$\${_BAZEL_INTERNAL:-0})}")
          else
            _BAZEL_RATIO="0.0"
          fi
          echo "bazel actions: total=\$\$_BAZEL_TOTAL internal=\$\$_BAZEL_INTERNAL cache_hit=\$\${_BAZEL_HIT:-0} local=\$\${_BAZEL_LOCAL:-0} hit_ratio=\$\$_BAZEL_RATIO%"
          echo "bazel summary: \$\$_BAZEL_PROC"
        else
          echo "bazel actions: (no summary found in log)"
          _BAZEL_HIT=0; _BAZEL_LOCAL=0; _BAZEL_RATIO="n/a"; _BAZEL_TOTAL=0; _BAZEL_INTERNAL=0
        fi

        # --- Bazel remote cache before/after delta ---
        _BAZEL_POST=\$\$(wget -qO- http://bazel-remote.build-tools.svc.cluster.local:8080/status 2>/dev/null || echo '{}')
        BAZEL_FILES=\$\$(echo "\$\$_BAZEL_POST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('NumFiles',0))" 2>/dev/null || echo 0)
        BAZEL_SIZE_MB=\$\$(echo "\$\$_BAZEL_POST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d.get('CurrSize',0))//1024//1024)" 2>/dev/null || echo 0)
        _BAZEL_FILES_DELTA=\$\$(( \$\${BAZEL_FILES:-0} - \$\${_BAZEL_FILES_PRE:-0} ))
        _BAZEL_SIZE_DELTA=\$\$(( \$\${BAZEL_SIZE_MB:-0} - \$\${_BAZEL_SIZE_PRE:-0} ))
        echo "bazel-remote: files=\$\$BAZEL_FILES (+\$\$_BAZEL_FILES_DELTA), size=\$\${BAZEL_SIZE_MB}MB (+\$\${_BAZEL_SIZE_DELTA}MB)"

        # --- ccache ---
        CCACHE_HITS=\$\$(ccache -s 2>/dev/null | awk '/^cache hit/ {sum += \$\$NF} END {print sum+0}' || echo 0)
        CCACHE_MISS=\$\$(ccache -s 2>/dev/null | awk '/^cache miss/ {sum += \$\$NF} END {print sum+0}' || echo 0)
        CCACHE_TOTAL=\$\$(( CCACHE_HITS + CCACHE_MISS ))
        if [ "\$\$CCACHE_TOTAL" -gt 0 ]; then
          CCACHE_RATIO=\$\$(awk "BEGIN{printf \"%.1f\", \$\$CCACHE_HITS*100/\$\$CCACHE_TOTAL}")
        else
          CCACHE_RATIO="n/a"
        fi
        echo "ccache: hits=\$\$CCACHE_HITS miss=\$\$CCACHE_MISS ratio=\$\$CCACHE_RATIO%"

        # --- Go cache size ---
        GOCACHE_SIZE=\$\$(du -sh \$\$GOCACHE 2>/dev/null | cut -f1 || echo "?")
        GOMOD_SIZE=\$\$(du -sh \$\$GOMODCACHE 2>/dev/null | cut -f1 || echo "?")
        echo "go-cache: \$\${GOCACHE_SIZE}  go-mod: \$\${GOMOD_SIZE}"

        # --- datasystem CMake: fresh build each run, ccache handles incremental ---
        DS_CACHE_STATUS="fresh cmake (ccache backed)"
        echo "datasystem cmake: \$\$DS_CACHE_STATUS"

        # --- Build time ---
        BUILD_MIN=\$\$(( BUILD_ELAPSED / 60 ))
        BUILD_SEC=\$\$(( BUILD_ELAPSED % 60 ))
        echo "build time: \$\${BUILD_MIN}m\$\${BUILD_SEC}s"

        # --- Buildkite annotation (visible in UI) ---
        {
          echo "<h3>📊 Cache Hit Report</h3>"
          echo "<table>"
          echo "<tr><th>Cache</th><th>Detail</th><th>Hit Rate</th></tr>"
          echo "<tr><td>🔵 Bazel actions</td><td>total=\$\$_BAZEL_TOTAL, internal=\$\$_BAZEL_INTERNAL, hit=\$\${_BAZEL_HIT:-0}, local=\$\${_BAZEL_LOCAL:-0}</td><td><b>\$\$_BAZEL_RATIO%</b></td></tr>"
          echo "<tr><td>🗄️ Bazel remote store</td><td>\$\$BAZEL_FILES files (+\$\$_BAZEL_FILES_DELTA new), \$\${BAZEL_SIZE_MB}MB (+\$\${_BAZEL_SIZE_DELTA}MB)</td><td>-</td></tr>"
          echo "<tr><td>⚡ ccache</td><td>hits=\$\$CCACHE_HITS / total=\$\$CCACHE_TOTAL</td><td><b>\$\$CCACHE_RATIO%</b></td></tr>"
          echo "<tr><td>🐹 Go cache</td><td>\$\$GOCACHE_SIZE (module: \$\$GOMOD_SIZE)</td><td>-</td></tr>"
          echo "<tr><td>🏗️ datasystem cmake</td><td>\$\$DS_CACHE_STATUS</td><td>-</td></tr>"
          echo "<tr><td>⏱️ Build time</td><td colspan=2><b>\$\${BUILD_MIN}m\$\${BUILD_SEC}s</b></td></tr>"
          echo "</table>"
        } | buildkite-agent annotate --style "info" --context "cache-report"
      ) || echo "WARNING: cache report generation failed; continuing"

      echo "=== [5/6] Collect Artifacts ==="
      mkdir -p artifacts/release
      cp output/openyuanrong-*.tar.gz artifacts/release/ 2>/dev/null || true
      cp output/*.whl artifacts/release/ 2>/dev/null || true
      ls -lh artifacts/release/
      bash .buildkite/upload_buildkite_packages.sh artifacts/release/*.whl

      echo "=== [6/6] Upload Artifacts to OBS ==="
      OBS_UPLOAD_CHANNEL="daily"
      OBS_UPLOAD_VERSION_ARGS=""
      if [ -n "\$\$TAG_BUILD_VERSION" ]; then
        OBS_UPLOAD_CHANNEL="release"
        OBS_UPLOAD_VERSION_ARGS="--version \$\$YR_BUILD_VERSION"
      fi
      bash .buildkite/upload_obs_artifacts.sh \
        --output artifacts/release/obs-urls.txt \
        --platform linux \
        --arch "\$\${BUILD_ARCH:-x86_64}" \
        --channel "\$\$OBS_UPLOAD_CHANNEL" \
        \$\$OBS_UPLOAD_VERSION_ARGS \
        -- artifacts/release/openyuanrong-*.tar.gz artifacts/release/*.whl

    agents:
      queue: "default"
      os: "linux"
      arch: "amd64"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: "$BUILD_ALL_IMAGE"
                volumeMounts:
                  - name: build-cache
                    mountPath: /mnt/paas
                resources:
                  requests: { cpu: "16", memory: "32Gi" }
                  limits: { cpu: "16", memory: "32Gi" }
                env:
                  - name: GO111MODULE
                    value: "on"
                  - name: CGO_ENABLED
                    value: "1"
                  - name: GOPROXY
                    value: "https://goproxy.cn,direct"
                  - name: OBS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: AK
                        optional: true
                  - name: OBS_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: SK
                        optional: true
                  - name: BUILDKITE_PACKAGE_UPLOAD_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: buildkite-package-credentials
                        key: api-token
                        optional: true
                  - name: OBS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: AK
                        optional: true
                  - name: OBS_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: SK
                        optional: true
            volumes:
              - name: build-cache
                hostPath:
                  path: /mnt/paas
                  type: DirectoryOrCreate
    timeout_in_minutes: 180
YAML
fi

if is_enabled "${ENABLE_RUNTIME_X86}"; then
cat << YAML
  - label: ":crab: Build RRT amd64"
    key: "build-rrt-amd64"
    command: |
      set -e
      export PATH=/opt/buildtools/python3.11/bin:/usr/local/bin:/usr/bin:\$\$PATH
      export CC=gcc-10
      export CXX=g++-10
      export PIP_BREAK_SYSTEM_PACKAGES=1
      COMMIT_FOR_VERSION="\$\${BUILDKITE_COMMIT:-\$\$(git rev-parse HEAD)}"
      SHORT_COMMIT=\$\$(printf '%s' "\$\$COMMIT_FOR_VERSION" | cut -c1-12)
      TAG_BUILD_VERSION="\$\${YR_RELEASE_TAG:-\$\${BUILDKITE_TAG:-}}"
      TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#refs/tags/}"
      case "\$\$TAG_BUILD_VERSION" in v[0-9]*) TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#v}" ;; esac
      YR_BUILD_VERSION="\$\${YR_BUILD_VERSION:-\$\${BUILD_VERSION:-\$\${TAG_BUILD_VERSION:-0.7.0+\$\$SHORT_COMMIT}}}"
      BAZEL_BUILD_VERSION="\$\${BAZEL_BUILD_VERSION:-\$\${TAG_BUILD_VERSION:-\$\$(cat VERSION)}}"
      export BAZEL_BUILD_VERSION
      export BUILD_VERSION="\$\$YR_BUILD_VERSION"
      echo "Package version: \$\$BUILD_VERSION"

      CACHE_BASE="/mnt/paas/build-cache"
      # Reuse build-all's cargo dirs so deps stay warm; sccache (content-addressed
      # on the persistent volume) keeps rustc warm even on a fresh node.
      export CARGO_HOME=\$\$CACHE_BASE/cargo-home
      export CARGO_TARGET_DIR=\$\$CACHE_BASE/cargo-target/amd64
      mkdir -p \$\$CARGO_HOME \$\$CARGO_TARGET_DIR
      . .buildkite/setup_sccache.sh

      echo "=== [rrt] cargo build rrt-runtime (release) ==="
      ( cd api/rust/rrt-daemon && cargo build --release --bin rrt-runtime )
      RRT_BIN="\$\$CARGO_TARGET_DIR/release/rrt-runtime"
      test -x "\$\$RRT_BIN" || { echo "rrt-runtime missing at \$\$RRT_BIN" >&2; exit 1; }

      echo "=== [rrt] package standalone openyuanrong-rrt wheel ==="
      OBS_UPLOAD_CHANNEL="daily"
      OBS_UPLOAD_VERSION_ARGS=""
      if [ -n "\$\$TAG_BUILD_VERSION" ]; then
        OBS_UPLOAD_CHANNEL="release"
        OBS_UPLOAD_VERSION_ARGS="--version \$\$YR_BUILD_VERSION"
      fi
      rm -rf artifacts/openyuanrong-rrt
      mkdir -p artifacts/openyuanrong-rrt
      ( cd api/python-rrt && RRT_RUNTIME_SRC="\$\$RRT_BIN" BUILD_VERSION="\$\$YR_BUILD_VERSION" python3 setup.py bdist_wheel -d "\$\$OLDPWD/artifacts/openyuanrong-rrt" )
      cp "\$\$RRT_BIN" "artifacts/openyuanrong-rrt/rrt-runtime-\$\${BUILD_ARCH:-x86_64}"
      ( cd artifacts/openyuanrong-rrt && sha256sum openyuanrong_rrt-*.whl rrt-runtime-* > SHA256SUMS )
      ls -lh artifacts/openyuanrong-rrt/
      ( cd artifacts/openyuanrong-rrt && buildkite-agent artifact upload "openyuanrong_rrt-*.whl" )
      bash .buildkite/upload_buildkite_packages.sh artifacts/openyuanrong-rrt/openyuanrong_rrt-*.whl || true
      bash .buildkite/upload_obs_artifacts.sh \
        --output artifacts/openyuanrong-rrt/obs-urls-rrt.txt \
        --platform linux \
        --arch "\$\${BUILD_ARCH:-x86_64}" \
        --channel "\$\$OBS_UPLOAD_CHANNEL" \
        \$\$OBS_UPLOAD_VERSION_ARGS \
        -- artifacts/openyuanrong-rrt/openyuanrong_rrt-*.whl artifacts/openyuanrong-rrt/rrt-runtime-* artifacts/openyuanrong-rrt/SHA256SUMS
    agents:
      queue: "default"
      os: "linux"
      arch: "amd64"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: "$RRT_BUILDER_IMAGE"
                volumeMounts:
                  - name: build-cache
                    mountPath: /mnt/paas
                resources:
                  requests: { cpu: "16", memory: "16Gi" }
                  limits: { cpu: "16", memory: "16Gi" }
                env:
                  - name: OBS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: AK
                        optional: true
                  - name: OBS_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: SK
                        optional: true
                  - name: BUILDKITE_PACKAGE_UPLOAD_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: buildkite-package-credentials
                        key: api-token
                        optional: true
            volumes:
              - name: build-cache
                hostPath:
                  path: /mnt/paas
                  type: DirectoryOrCreate
    timeout_in_minutes: 90
YAML
fi

for SDK_PYTHON_VERSION in ${SDK_PYTHON_VERSIONS}; do
  SDK_SUFFIX="$(sdk_python_suffix "${SDK_PYTHON_VERSION}")"
cat << YAML
  - label: ":snake: Build SDK X86 ${SDK_SUFFIX}"
    key: "build-sdk-amd64-${SDK_SUFFIX}"
    command: |
      set -e
      export PATH=/opt/buildtools/python3.9/bin:/usr/local/bin:/usr/bin:\$\$PATH
      export CC=gcc-10
      export CXX=g++-10
      export PIP_BREAK_SYSTEM_PACKAGES=1
      export SDK_PYTHON_VERSIONS="${SDK_PYTHON_VERSION}"
      COMMIT_FOR_VERSION="\$\${BUILDKITE_COMMIT:-\$\$(git rev-parse HEAD)}"
      SHORT_COMMIT=\$\$(printf '%s' "\$\$COMMIT_FOR_VERSION" | cut -c1-12)
      TAG_BUILD_VERSION="\$\${YR_RELEASE_TAG:-\$\${BUILDKITE_TAG:-}}"
      TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#refs/tags/}"
      case "\$\$TAG_BUILD_VERSION" in v[0-9]*) TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#v}" ;; esac
      YR_BUILD_VERSION="\$\${YR_BUILD_VERSION:-\$\${BUILD_VERSION:-\$\${TAG_BUILD_VERSION:-0.7.0+\$\$SHORT_COMMIT}}}"
      BAZEL_BUILD_VERSION="\$\${BAZEL_BUILD_VERSION:-\$\${TAG_BUILD_VERSION:-\$\$(cat VERSION)}}"
      export BAZEL_BUILD_VERSION
      export BUILD_VERSION="\$\$YR_BUILD_VERSION"
      export COMMIT_ID="\$\$COMMIT_FOR_VERSION"
      echo "Package version: \$\$BUILD_VERSION"
      echo "Bazel build version: \$\$BAZEL_BUILD_VERSION"

      CACHE_BASE="/mnt/paas/build-cache"
      mkdir -p \$\$CACHE_BASE/go-mod \$\$CACHE_BASE/go-cache \$\$CACHE_BASE/pip
      export GOMODCACHE=\$\$CACHE_BASE/go-mod
      export GOCACHE=\$\$CACHE_BASE/go-cache/amd64
      export PIP_CACHE_DIR=\$\$CACHE_BASE/pip
      mkdir -p \$\$CACHE_BASE/bazel-repository-cache/amd64
      export BAZEL_REPOSITORY_CACHE=\$\$CACHE_BASE/bazel-repository-cache/amd64
      export BUILD_ARCH=amd64
      bash .buildkite/prepare_sdk_thirdparty_cache.sh "\$\$CACHE_BASE"
      export SKIP_RUNTIME_DEPENDENCY_DOWNLOAD=1
      BAZEL_REMOTE_URL="grpc://bazel-remote.build-tools.svc.cluster.local:9092"
      case "\$\${YR_BUILDKITE_ENABLE_BAZEL_REMOTE_CACHE:-false}" in
        1|true|TRUE|yes|YES|on|ON) _YR_BAZEL_REMOTE_ENABLED=1 ;;
        *) _YR_BAZEL_REMOTE_ENABLED=0 ;;
      esac
      if [ "\$\$_YR_BAZEL_REMOTE_ENABLED" = "1" ] && timeout 5 bash -c "echo > /dev/tcp/bazel-remote.build-tools.svc.cluster.local/9092" 2>/dev/null; then
        export REMOTE_CACHE="\$\${BAZEL_REMOTE_URL}"
      fi

      git submodule sync --recursive
      git submodule update --init --recursive --force --jobs=4
      rm -f output/openyuanrong_sdk-*.whl
      bash .buildkite/build_openyuanrong_sdk_wheels.sh output

      rm -rf artifacts/openyuanrong-sdk
      mkdir -p artifacts/openyuanrong-sdk
      cp output/openyuanrong_sdk-*.whl artifacts/openyuanrong-sdk/
      ls -lh artifacts/openyuanrong-sdk/
      bash .buildkite/upload_buildkite_packages.sh artifacts/openyuanrong-sdk/*.whl
      OBS_UPLOAD_CHANNEL="daily"
      OBS_UPLOAD_VERSION_ARGS=""
      if [ -n "\$\$TAG_BUILD_VERSION" ]; then
        OBS_UPLOAD_CHANNEL="release"
        OBS_UPLOAD_VERSION_ARGS="--version \$\$BUILD_VERSION"
      fi
      bash .buildkite/upload_obs_artifacts.sh \
        --output artifacts/openyuanrong-sdk/obs-urls.txt \
        --platform linux \
        --arch amd64 \
        --channel "\$\$OBS_UPLOAD_CHANNEL" \
        \$\$OBS_UPLOAD_VERSION_ARGS \
        -- artifacts/openyuanrong-sdk/*.whl
    agents:
      queue: "default"
      os: "linux"
      arch: "amd64"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: "$SDK_BUILDER_IMAGE"
                volumeMounts:
                  - name: build-cache
                    mountPath: /mnt/paas
                resources:
                  requests: { cpu: "4", memory: "8Gi" }
                  limits: { cpu: "8", memory: "16Gi" }
                env:
                  - name: GO111MODULE
                    value: "on"
                  - name: CGO_ENABLED
                    value: "1"
                  - name: GOPROXY
                    value: "https://goproxy.cn,direct"
                  - name: BUILDKITE_PACKAGE_UPLOAD_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: buildkite-package-credentials
                        key: api-token
                        optional: true
                  - name: OBS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: AK
                        optional: true
                  - name: OBS_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: SK
                        optional: true
            volumes:
              - name: build-cache
                hostPath:
                  path: /mnt/paas
                  type: DirectoryOrCreate
    timeout_in_minutes: 120
YAML
done

case "${ENABLE_SANDBOX_PACKAGE}" in
  1|true|TRUE|yes|YES|on|ON)
cat << YAML
  - label: ":package: Build Image"
    key: "publish-sandbox-release-amd64"
