      bash .buildkite/prepare_sdk_thirdparty_cache.sh "\$\$CACHE_BASE"
      export SKIP_RUNTIME_DEPENDENCY_DOWNLOAD=1
      BAZEL_REMOTE_URL="grpc://bazel-remote.build-tools.svc.cluster.local:9092"
      case "\$\${YR_BUILDKITE_ENABLE_BAZEL_REMOTE_CACHE:-false}" in
        1|true|TRUE|yes|YES|on|ON) _YR_BAZEL_REMOTE_ENABLED=1 ;;
        *) _YR_BAZEL_REMOTE_ENABLED=0 ;;
      esac
      if [ "\$\$_YR_BAZEL_REMOTE_ENABLED" = "1" ] && timeout 5 bash -c "echo > /dev/tcp/bazel-remote.build-tools.svc.cluster.local/9092" 2>/dev/null; then
        export REMOTE_CACHE="\$\${BAZEL_REMOTE_URL}"
      fi

      git submodule sync --recursive
      git submodule update --init --recursive --force --jobs=4
      rm -f output/openyuanrong_sdk-*.whl
