done
;;
esac

case "${ENABLE_LINUX_ARM}" in
  1|true|TRUE|yes|YES|on|ON)
if is_enabled "${ENABLE_RUNTIME_ARM}"; then
cat << YAML
  - label: ":penguin: Build arm"
    key: "build-all-arm64"
    command: |
      set -e
      echo "=== [1/3] Environment Setup ==="

      export PATH=/opt/buildtools/python3.9/bin:/usr/local/bin:/usr/bin:\$\$PATH
      export CC=gcc-10
      export CXX=g++-10
      export PIP_BREAK_SYSTEM_PACKAGES=1
      export BUILD_ARCH=arm64
      # arm64 rrt-runtime is optional and built only when ENABLE_RRT_ARM=1.
      # Keep Rust skipped here so non-RRT arm64 artifacts are not blocked by
      # the temporary lack of a Rust-capable arm64 builder image.
      export BUILD_SKIP_RUST=1
      export SDK_PYTHON_VERSIONS="${SDK_PYTHON_VERSIONS}"
      JOBS="\$\${JOBS:-16}"
      FUNCTIONSYSTEM_JOBS="\$\${FUNCTIONSYSTEM_JOBS:-8}"
      export FUNCTIONSYSTEM_JOBS
      COMMIT_FOR_VERSION="\$\${BUILDKITE_COMMIT:-\$\$(git rev-parse HEAD)}"
      SHORT_COMMIT=\$\$(printf '%s' "\$\$COMMIT_FOR_VERSION" | cut -c1-12)
      TAG_BUILD_VERSION="\$\${YR_RELEASE_TAG:-\$\${BUILDKITE_TAG:-}}"
      TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#refs/tags/}"
      case "\$\$TAG_BUILD_VERSION" in v[0-9]*) TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#v}" ;; esac
      YR_BUILD_VERSION="\$\${YR_BUILD_VERSION:-\$\${BUILD_VERSION:-\$\${TAG_BUILD_VERSION:-0.7.0+\$\$SHORT_COMMIT}}}"
      BAZEL_BUILD_VERSION="\$\${BAZEL_BUILD_VERSION:-\$\${TAG_BUILD_VERSION:-\$\$(cat VERSION)}}"
      export BAZEL_BUILD_VERSION
      export COMMIT_ID="\$\$COMMIT_FOR_VERSION"
      echo "Package version: \$\$YR_BUILD_VERSION"
      echo "Bazel build version: \$\$BAZEL_BUILD_VERSION"

      CACHE_BASE="/mnt/paas/build-cache"
      mkdir -p \$\$CACHE_BASE/ccache \$\$CACHE_BASE/go-mod \$\$CACHE_BASE/go-cache \
        \$\$CACHE_BASE/opensource \$\$CACHE_BASE/pip \$\$CACHE_BASE/functionsystem-vendor-cache
      export CCACHE_DIR=\$\$CACHE_BASE/ccache
      export CCACHE_MAXSIZE="\$\${CCACHE_MAXSIZE:-100G}"
      ccache -M "\$\$CCACHE_MAXSIZE"
      export GOMODCACHE=\$\$CACHE_BASE/go-mod
      export PIP_CACHE_DIR=\$\$CACHE_BASE/pip
      # Keep Go's content-addressed build cache warm across Buildkite jobs; cache-aging handles old entries.
      export GOCACHE=\$\$CACHE_BASE/go-cache/\$\${BUILD_ARCH:-arm64}
      # cargo cache on the persistent volume so the //api/rust genrule does an
      # INCREMENTAL cargo build (deps cached) instead of a ~48min from-scratch
      # release build every checkout. genrule honors CARGO_TARGET_DIR.
      export CARGO_HOME=\$\$CACHE_BASE/cargo-home
      export CARGO_TARGET_DIR=\$\$CACHE_BASE/cargo-target/\$\${BUILD_ARCH:-arm64}
      mkdir -p \$\$CARGO_HOME \$\$CARGO_TARGET_DIR
      mkdir -p "\$\$GOCACHE"
      export DS_OPENSOURCE_DIR=\$\$CACHE_BASE/opensource
      export FS_VENDOR_CACHE_DIR=\$\$CACHE_BASE/functionsystem-vendor-cache
      collect_failure_logs() {
        _STATUS="\$\$1"
        _ARCH="\$\${BUILD_ARCH:-x86_64}"
        _LOG_DIR="artifacts/failure-logs/\$\$_ARCH"
        echo "=== Build failed (exit \$\$_STATUS); collecting diagnostic logs ==="
        mkdir -p "\$\$_LOG_DIR"
        [ -f /tmp/build_output.log ] && cp /tmp/build_output.log "\$\$_LOG_DIR/build_output.log"
        for _DIR in \
            functionsystem/vendor/output/Stamp \
            functionsystem/vendor/src \
            functionsystem/build \
            datasystem/build; do
          if [ -d "\$\$_DIR" ]; then
            find "\$\$_DIR" -type f \( -name "*.log" -o -name "*.rej" \) -print >> "\$\$_LOG_DIR/file-list.txt" || true
          fi
        done
        if [ -s "\$\$_LOG_DIR/file-list.txt" ]; then
          tar -czf "\$\$_LOG_DIR/internal-logs.tar.gz" -T "\$\$_LOG_DIR/file-list.txt" || true
        fi
        ls -lh "\$\$_LOG_DIR" || true
      }
      BAZEL_REMOTE_URL="grpc://bazel-remote.build-tools.svc.cluster.local:9092"
      echo "=== Configuring bazel-remote cache ==="
      case "\$\${YR_BUILDKITE_ENABLE_BAZEL_REMOTE_CACHE:-false}" in
        1|true|TRUE|yes|YES|on|ON) _YR_BAZEL_REMOTE_ENABLED=1 ;;
        *) _YR_BAZEL_REMOTE_ENABLED=0 ;;
      esac
      if [ "\$\$_YR_BAZEL_REMOTE_ENABLED" = "1" ] && timeout 5 bash -c "echo > /dev/tcp/bazel-remote.build-tools.svc.cluster.local/9092" 2>/dev/null; then
        echo "bazel-remote reachable: \$\${BAZEL_REMOTE_URL}"
        export REMOTE_CACHE="\$\${BAZEL_REMOTE_URL}"
      else
        echo "WARNING: bazel-remote disabled or not reachable, building without remote cache"
      fi

      echo "=== [2/3] Submodule Update ==="
      git submodule sync --recursive
      git submodule update --init --recursive --force --jobs=4

      echo "=== [3/6] Starting Build (JOBS=\$\$JOBS, FUNCTIONSYSTEM_JOBS=\$\$FUNCTIONSYSTEM_JOBS) ==="
      _BAZEL_PRE=\$\$(wget -qO- http://bazel-remote.build-tools.svc.cluster.local:8080/status 2>/dev/null || echo '{}')
      _BAZEL_FILES_PRE=\$\$(echo "\$\$_BAZEL_PRE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('NumFiles',0))" 2>/dev/null || echo 0)
      _BAZEL_SIZE_PRE=\$\$(echo "\$\$_BAZEL_PRE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d.get('CurrSize',0))//1024//1024)" 2>/dev/null || echo 0)

      BUILD_START=\$\$(date +%s)
      rm -f /tmp/yr_build_pipe
      mkfifo /tmp/yr_build_pipe
      tee /tmp/build_output.log < /tmp/yr_build_pipe &
      set +e
      make all BUILD_VERSION="\$\$YR_BUILD_VERSION" JOBS=\$\$JOBS FUNCTIONSYSTEM_JOBS=\$\$FUNCTIONSYSTEM_JOBS REMOTE_CACHE=\$\${REMOTE_CACHE:-} > /tmp/yr_build_pipe 2>&1
      BUILD_EXIT=\$\$?
      wait
      set -e
      rm -f /tmp/yr_build_pipe
      BUILD_END=\$\$(date +%s)
      BUILD_ELAPSED=\$\$(( BUILD_END - BUILD_START ))
      if [ "\$\$BUILD_EXIT" -ne 0 ]; then
        collect_failure_logs "\$\$BUILD_EXIT"
        exit "\$\$BUILD_EXIT"
      fi
      [ "\$\$BUILD_EXIT" -eq 0 ]

      echo "=== [3.1/6] Collect release artifacts from make all ==="
      find output -maxdepth 1 -name 'openyuanrong-*.tar.gz' -print -quit | grep -q .
      find output -maxdepth 1 -name 'openyuanrong-*.whl' -print -quit | grep -q .

      echo "=== [3.5/6] Verify Go plugin ABI ==="
      python3 .buildkite/verify_go_plugin_abi.py

      (
        set +e
        echo "=== [4/6] Cache Hit Report ==="
        _BAZEL_PROC=\$\$(grep -E "^INFO: [0-9,]+ processes:" /tmp/build_output.log | tail -1 || echo "")
        if [ -n "\$\$_BAZEL_PROC" ]; then
          _BAZEL_TOTAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ processes" | tr -d ',')
          _BAZEL_TOTAL=\$\${_BAZEL_TOTAL% processes}
          _BAZEL_HIT=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ remote cache hit" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          _BAZEL_LOCAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ processwrapper-sandbox" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          _BAZEL_INTERNAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ internal" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          if [ "\$\${_BAZEL_TOTAL:-0}" -gt 0 ] && [ "\$\${_BAZEL_HIT:-0}" -gt 0 ]; then
            _BAZEL_RATIO=\$\$(awk "BEGIN{printf \"%.1f\", \$\${_BAZEL_HIT}*100/(\$\${_BAZEL_TOTAL}-\$\${_BAZEL_INTERNAL:-0})}")
          else
            _BAZEL_RATIO="0.0"
          fi
          echo "bazel actions: total=\$\$_BAZEL_TOTAL internal=\$\$_BAZEL_INTERNAL cache_hit=\$\${_BAZEL_HIT:-0} local=\$\${_BAZEL_LOCAL:-0} hit_ratio=\$\$_BAZEL_RATIO%"
          echo "bazel summary: \$\$_BAZEL_PROC"
        else
          echo "bazel actions: (no summary found in log)"
          _BAZEL_HIT=0; _BAZEL_LOCAL=0; _BAZEL_RATIO="n/a"; _BAZEL_TOTAL=0; _BAZEL_INTERNAL=0
        fi

        _BAZEL_POST=\$\$(wget -qO- http://bazel-remote.build-tools.svc.cluster.local:8080/status 2>/dev/null || echo '{}')
        BAZEL_FILES=\$\$(echo "\$\$_BAZEL_POST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('NumFiles',0))" 2>/dev/null || echo 0)
        BAZEL_SIZE_MB=\$\$(echo "\$\$_BAZEL_POST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d.get('CurrSize',0))//1024//1024)" 2>/dev/null || echo 0)
        _BAZEL_FILES_DELTA=\$\$(( \$\${BAZEL_FILES:-0} - \$\${_BAZEL_FILES_PRE:-0} ))
        _BAZEL_SIZE_DELTA=\$\$(( \$\${BAZEL_SIZE_MB:-0} - \$\${_BAZEL_SIZE_PRE:-0} ))
        echo "bazel-remote: files=\$\$BAZEL_FILES (+\$\$_BAZEL_FILES_DELTA), size=\$\${BAZEL_SIZE_MB}MB (+\$\${_BAZEL_SIZE_DELTA}MB)"

        CCACHE_HITS=\$\$(ccache -s 2>/dev/null | awk '/^cache hit/ {sum += \$\$NF} END {print sum+0}' || echo 0)
        CCACHE_MISS=\$\$(ccache -s 2>/dev/null | awk '/^cache miss/ {sum += \$\$NF} END {print sum+0}' || echo 0)
        CCACHE_TOTAL=\$\$(( CCACHE_HITS + CCACHE_MISS ))
        if [ "\$\$CCACHE_TOTAL" -gt 0 ]; then
          CCACHE_RATIO=\$\$(awk "BEGIN{printf \"%.1f\", \$\$CCACHE_HITS*100/\$\$CCACHE_TOTAL}")
        else
          CCACHE_RATIO="n/a"
        fi
        echo "ccache: hits=\$\$CCACHE_HITS miss=\$\$CCACHE_MISS ratio=\$\$CCACHE_RATIO%"

        GOCACHE_SIZE=\$\$(du -sh \$\$GOCACHE 2>/dev/null | cut -f1 || echo "?")
        GOMOD_SIZE=\$\$(du -sh \$\$GOMODCACHE 2>/dev/null | cut -f1 || echo "?")
        echo "go-cache: \$\${GOCACHE_SIZE}  go-mod: \$\${GOMOD_SIZE}"

        DS_CACHE_STATUS="fresh cmake (ccache backed)"
        echo "datasystem cmake: \$\$DS_CACHE_STATUS"

        BUILD_MIN=\$\$(( BUILD_ELAPSED / 60 ))
        BUILD_SEC=\$\$(( BUILD_ELAPSED % 60 ))
        echo "build time: \$\${BUILD_MIN}m\$\${BUILD_SEC}s"

        {
          echo "<h3>📊 Cache Hit Report</h3>"
          echo "<table>"
          echo "<tr><th>Cache</th><th>Detail</th><th>Hit Rate</th></tr>"
          echo "<tr><td>🔵 Bazel actions</td><td>total=\$\$_BAZEL_TOTAL, internal=\$\$_BAZEL_INTERNAL, hit=\$\${_BAZEL_HIT:-0}, local=\$\${_BAZEL_LOCAL:-0}</td><td><b>\$\$_BAZEL_RATIO%</b></td></tr>"
          echo "<tr><td>🗄️ Bazel remote store</td><td>\$\$BAZEL_FILES files (+\$\$_BAZEL_FILES_DELTA new), \$\${BAZEL_SIZE_MB}MB (+\$\${_BAZEL_SIZE_DELTA}MB)</td><td>-</td></tr>"
          echo "<tr><td>⚡ ccache</td><td>hits=\$\$CCACHE_HITS / total=\$\$CCACHE_TOTAL</td><td><b>\$\$CCACHE_RATIO%</b></td></tr>"
          echo "<tr><td>🐹 Go cache</td><td>\$\$GOCACHE_SIZE (module: \$\$GOMOD_SIZE)</td><td>-</td></tr>"
          echo "<tr><td>🏗️ datasystem cmake</td><td>\$\$DS_CACHE_STATUS</td><td>-</td></tr>"
          echo "<tr><td>⏱️ Build time</td><td colspan=2><b>\$\${BUILD_MIN}m\$\${BUILD_SEC}s</b></td></tr>"
          echo "</table>"
        } | buildkite-agent annotate --style "info" --context "cache-report-arm64"
      ) || echo "WARNING: cache report generation failed; continuing"

      echo "=== [5/6] Collect Artifacts ==="
      mkdir -p artifacts/release
      cp output/openyuanrong-*.tar.gz artifacts/release/ 2>/dev/null || true
      cp output/*.whl artifacts/release/ 2>/dev/null || true
      ls -lh artifacts/release/
      bash .buildkite/upload_buildkite_packages.sh artifacts/release/*.whl

      echo "=== [6/6] Upload Artifacts to OBS ==="
      OBS_UPLOAD_CHANNEL="daily"
      OBS_UPLOAD_VERSION_ARGS=""
      if [ -n "\$\$TAG_BUILD_VERSION" ]; then
        OBS_UPLOAD_CHANNEL="release"
        OBS_UPLOAD_VERSION_ARGS="--version \$\$YR_BUILD_VERSION"
      fi
      bash .buildkite/upload_obs_artifacts.sh \
        --output artifacts/release/obs-urls.txt \
        --platform linux \
        --arch arm64 \
        --channel "\$\$OBS_UPLOAD_CHANNEL" \
        \$\$OBS_UPLOAD_VERSION_ARGS \
        -- artifacts/release/openyuanrong-*.tar.gz artifacts/release/*.whl

    agents:
      queue: "default"
      os: "linux"
      linux_arch: "arm64"
    plugins:
      - kubernetes:
