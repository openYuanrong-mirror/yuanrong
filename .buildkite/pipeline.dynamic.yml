case "${ENABLE_MACOS_SDK}" in
  1|true|TRUE|yes|YES|on|ON)
for SDK_PYTHON_VERSION in ${SDK_PYTHON_VERSIONS}; do
  SDK_SUFFIX="$(sdk_python_suffix "${SDK_PYTHON_VERSION}")"
cat << YAML
  - label: ":snake: Build SDK macOS ${SDK_SUFFIX}"
    key: "build-sdk-macos-arm64-${SDK_SUFFIX}"
    command: |
      set -e
      echo "=== [1/4] Sync submodules ==="
      git submodule sync --recursive
      git submodule update --init --recursive --force --jobs=4
      COMMIT_FOR_VERSION="\$\${BUILDKITE_COMMIT:-\$\$(git rev-parse HEAD)}"
      SHORT_COMMIT=\$\$(printf '%s' "\$\$COMMIT_FOR_VERSION" | cut -c1-12)
      TAG_BUILD_VERSION="\$\${YR_RELEASE_TAG:-\$\${BUILDKITE_TAG:-}}"
      TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#refs/tags/}"
      case "\$\$TAG_BUILD_VERSION" in v[0-9]*) TAG_BUILD_VERSION="\$\${TAG_BUILD_VERSION#v}" ;; esac
      YR_BUILD_VERSION="\$\${YR_BUILD_VERSION:-\$\${BUILD_VERSION:-\$\${TAG_BUILD_VERSION:-0.7.0+\$\$SHORT_COMMIT}}}"
      BAZEL_BUILD_VERSION="\$\${BAZEL_BUILD_VERSION:-\$\${TAG_BUILD_VERSION:-\$\$(cat VERSION)}}"
      export BAZEL_BUILD_VERSION
      export BUILD_VERSION="\$\$YR_BUILD_VERSION"
      export COMMIT_ID="\$\$COMMIT_FOR_VERSION"
      export SDK_PYTHON_VERSIONS="${SDK_PYTHON_VERSION}"
      unset REMOTE_CACHE
      echo "Package version: \$\$BUILD_VERSION"
      echo "Bazel build version: \$\$BAZEL_BUILD_VERSION"

      echo "=== [2/4] Ensure macOS SDK toolchain ==="
      SKIP_BREW_UPDATE="\$\${SKIP_BREW_UPDATE:-1}" bash scripts/ensure-macos-build-tools.sh

      echo "=== [3/4] Build openyuanrong-sdk wheels ==="
      rm -f output/openyuanrong_sdk-*.whl
      bash .buildkite/build_openyuanrong_sdk_wheels.sh output

      echo "=== [4/4] Collect openyuanrong-sdk artifacts ==="
      rm -rf artifacts/openyuanrong-sdk
      mkdir -p artifacts/openyuanrong-sdk
      cp output/openyuanrong_sdk-*.whl artifacts/openyuanrong-sdk/
      ls -lh artifacts/openyuanrong-sdk/
      bash .buildkite/upload_buildkite_packages.sh artifacts/openyuanrong-sdk/*.whl
      OBS_UPLOAD_CHANNEL="daily"
      OBS_UPLOAD_VERSION_ARGS=""
      if [ -n "\$\$TAG_BUILD_VERSION" ]; then
        OBS_UPLOAD_CHANNEL="release"
        OBS_UPLOAD_VERSION_ARGS="--version \$\$BUILD_VERSION"
      fi
      OBS_PYTHON=python3 bash .buildkite/upload_obs_artifacts.sh \
        --output artifacts/openyuanrong-sdk/obs-urls.txt \
        --platform macos \
        --arch arm64 \
        --channel "\$\$OBS_UPLOAD_CHANNEL" \
        \$\$OBS_UPLOAD_VERSION_ARGS \
        -- artifacts/openyuanrong-sdk/*.whl
    env:
      # Submodule renamed agentruntime->sandbox-sdk; macOS Mac-mini agents reuse a
      # persistent checkout whose stale .git/modules/agentruntime breaks the submodule
      # checkout. Force a clean re-clone to clear it.
      BUILDKITE_CLEAN_CHECKOUT: "true"
    agents:
      queue: "default"
      os: "macos"
      arch: "arm64"
    timeout_in_minutes: 120
YAML
done
;;
esac

