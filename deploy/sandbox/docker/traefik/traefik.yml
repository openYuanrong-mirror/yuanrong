entryPoints:
  web:
    address: ":8888"
  tcp:
    address: ":4443"

providers:
  # File provider for static configuration
  file:
    filename: /openyuanrong/traefik/dynamic.yml
    watch: true
  http:
    endpoint: "http://__AIO_NODE_IP__:22770/global-scheduler/traefik/config"
    pollInterval: "5s"
    pollTimeout: "5s"

log:
  level: INFO

api:
  dashboard: false
